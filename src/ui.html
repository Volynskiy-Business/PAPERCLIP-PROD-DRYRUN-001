<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recruiting Prospect Dry Run</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #5b6472;
        --line: #dbe3ea;
        --panel: #ffffff;
        --bg: #f5f7f9;
        --accent: #0f766e;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: clamp(24px, 5vw, 44px);
        box-shadow: 0 18px 48px rgb(17 24 39 / 8%);
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      .eyebrow {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      dl {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        margin: 32px 0 0;
        background: var(--line);
        border: 1px solid var(--line);
      }

      div {
        min-width: 0;
        background: var(--panel);
        padding: 16px;
      }

      dt {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      dd {
        margin: 8px 0 0;
        font-weight: 800;
      }

      @media (max-width: 640px) {
        dl {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main data-release="__RELEASE__">
      <section>
        <p class="eyebrow">PAPERCLIP-PROD-DRYRUN-001</p>
        <h1>Recruiting prospect slice is staged.</h1>
        <p>
          This hosted executable slice proves health checks, authenticated prospect mutations,
          audit events, structured logs, CI, deployment, and rollback evidence.
        </p>
        <dl>
          <div>
            <dt>Release</dt>
            <dd>__RELEASE__</dd>
          </div>
          <div>
            <dt>Mode</dt>
            <dd>staging</dd>
          </div>
          <div>
            <dt>Runtime</dt>
            <dd>Node HTTP</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
